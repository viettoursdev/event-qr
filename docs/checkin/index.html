<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Check-in khách mời</title>
    <link rel="stylesheet" href="./checkin.css" />
  </head>
  <body>
    <!-- Màn hình đăng nhập -->
    <section id="login" class="login">
      <div class="login-inner">
        <div class="brandmark">
          <img src="../assets/logo-white.png" alt="Viettours"
            onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
          <div class="brandmark-text" style="display:none">
            Viettours<small>Incentives &amp; Events</small>
          </div>
        </div>
        <div class="login-card">
          <div class="brand" id="brandName">Check-in khách mời</div>
          <div class="login-sub">Dành cho nhân viên đón khách</div>
        <label class="field">
          <span>Email tài khoản máy</span>
          <input id="station" type="email" inputmode="email" placeholder="checkin.may01@viettours.local" autocomplete="username" autocapitalize="none" spellcheck="false" />
        </label>
        <label class="field">
          <span>Mật khẩu</span>
          <input id="pin" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" />
        </label>
        <button id="loginBtn" class="btn-primary">Vào ca trực</button>
        <div id="loginError" class="error"></div>
        <div id="demoNote" class="demo-note" hidden>● CHẾ ĐỘ DEMO — dữ liệu mẫu, không lưu thật</div>
        </div>
      </div>
    </section>

    <!-- Ứng dụng check-in -->
    <section id="app" class="app" hidden>
      <header class="topbar">
        <div class="topbar-left">
          <img class="topbar-logo" src="../assets/logo-white.png" alt="Viettours"
            onerror="this.style.display='none'" />
          <div>
            <div class="event" id="eventName"></div>
            <div class="counter"><b id="countDone">0</b><span>/<span id="countTotal">0</span> check-in</span> · <b id="countConfirm">0</b><span> xác nhận</span></div>
          </div>
        </div>
        <div class="topbar-right">
          <span class="station-tag">🖥 <span id="stationTag"></span></span>
          <button id="btnDash" class="btn-ghost" title="Bảng thống kê khách & bàn">📊 Thống kê</button>
          <button id="btnExport" class="btn-ghost" title="Tải file backup danh sách + trạng thái">⬇ Backup</button>
          <button id="btnImport" class="btn-ghost" title="Khôi phục trạng thái check-in/xác nhận từ file backup">⬆ Nhập</button>
          <input id="importFile" type="file" accept=".csv" hidden />
          <button id="logoutBtn" class="btn-ghost">Thoát</button>
        </div>
      </header>

      <!-- Bảng điều khiển ADMIN (chỉ hiện với tài khoản admin) -->
      <div id="adminBar" class="adminbar" hidden>
        <span class="adminbar-label">🔑 Admin · Khoá/mở thao tác cho lễ tân:</span>
        <button id="lockCheckin" class="lockbtn" type="button"></button>
        <button id="lockConfirm" class="lockbtn" type="button"></button>
        <button id="lockVeg" class="lockbtn" type="button"></button>
        <button id="btnResetAll" class="lockbtn danger" type="button" title="Xoá toàn bộ check-in/xác nhận/ăn chay về 0">🔄 Reset tất cả về 0</button>
      </div>

      <div class="search-wrap">
        <input id="search" type="text" inputmode="search" autocomplete="off"
          placeholder="Tìm theo tên, STT, số điện thoại hoặc công ty…" />
        <button id="clearSearch" class="clear" hidden>✕</button>
      </div>

      <div class="filterbar">
        <button id="fChkDone" class="chip" type="button">Đã check-in <b id="cChkDone"></b></button>
        <button id="fChkUndone" class="chip" type="button">Chưa check-in <b id="cChkUndone"></b></button>
        <button id="fCfmDone" class="chip" type="button">Đã xác nhận <b id="cCfmDone"></b></button>
        <button id="fCfmUndone" class="chip" type="button">Chưa xác nhận <b id="cCfmUndone"></b></button>
        <button id="fVeg" class="chip" type="button">🥗 Ăn chay <b id="cVeg"></b></button>
      </div>

      <div id="results" class="results"></div>
      <div id="statusbar" class="statusbar" hidden></div>
    </section>

    <script type="module" src="./checkin.js?v=9"></script>
  </body>
</html>
